<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>
  <!-- Awning -->
  <path d="M100,160 L256,80 L412,160 L412,220 L100,220 Z" fill="rgba(255,255,255,0.2)"/>
  <path d="M130,160 L256,90 L382,160" fill="none" stroke="#fff" stroke-width="3" opacity="0.5"/>
  <!-- Stall table -->
  <rect x="140" y="240" width="232" height="20" rx="6" fill="#fff" opacity="0.9"/>
  <!-- Legs -->
  <rect x="170" y="260" width="12" height="120" rx="4" fill="#fff" opacity="0.6"/>
  <rect x="330" y="260" width="12" height="120" rx="4" fill="#fff" opacity="0.6"/>
  <!-- Counter badge -->
  <circle cx="380" cy="170" r="56" fill="url(#accent)"/>
  <text x="380" y="176" text-anchor="middle" font-family="system-ui" font-size="36" font-weight="800" fill="#fff">42</text>
  <!-- Product cards on table -->
  <rect x="160" y="210" width="50" height="30" rx="8" fill="#fff" opacity="0.85"/>
  <rect x="220" y="210" width="50" height="30" rx="8" fill="#fff" opacity="0.85"/>
  <rect x="280" y="210" width="50" height="30" rx="8" fill="#fff" opacity="0.85"/>
</svg>
