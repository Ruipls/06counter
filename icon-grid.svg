<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>
  <!-- Six dots in a grid (representing 6-counter) -->
  <circle cx="176" cy="176" r="40" fill="#fff" opacity="0.9"/>
  <circle cx="336" cy="176" r="40" fill="#fff" opacity="0.9"/>
  <circle cx="176" cy="296" r="40" fill="#fff" opacity="0.7"/>
  <circle cx="336" cy="296" r="40" fill="#fff" opacity="0.7"/>
  <circle cx="176" cy="416" r="40" fill="#fff" opacity="0.5"/>
  <circle cx="336" cy="416" r="40" fill="#fff" opacity="0.5"/>
  <!-- Numbers inside dots -->
  <text x="176" y="194" text-anchor="middle" font-family="system-ui" font-size="36" font-weight="800" fill="#4f46e5">12</text>
  <text x="336" y="194" text-anchor="middle" font-family="system-ui" font-size="36" font-weight="800" fill="#4f46e5">8</text>
  <text x="176" y="314" text-anchor="middle" font-family="system-ui" font-size="36" font-weight="800" fill="#4f46e5">6</text>
  <text x="336" y="314" text-anchor="middle" font-family="system-ui" font-size="36" font-weight="800" fill="#4f46e5">3</text>
  <text x="176" y="434" text-anchor="middle" font-family="system-ui" font-size="36" font-weight="800" fill="#4f46e5">1</text>
  <!-- Last dot is special: showing +1 action -->
  <circle cx="336" cy="416" r="40" fill="#f59e0b" opacity="0.9"/>
  <text x="336" y="440" text-anchor="middle" font-family="system-ui" font-size="32" font-weight="800" fill="#fff">+1</text>
</svg>
