<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>
  <!-- Number display panel -->
  <rect x="80" y="80" width="352" height="280" rx="40" fill="rgba(255,255,255,0.15)"/>
  <rect x="100" y="100" width="312" height="240" rx="28" fill="#fff"/>
  <!-- LCD digits -->
  <text x="256" y="260" text-anchor="middle" font-family="monospace" font-size="160" font-weight="700" fill="#4f46e5">88</text>
  <!-- Counter buttons -->
  <circle cx="160" cy="420" r="52" fill="rgba(255,255,255,0.25)" stroke="#fff" stroke-width="4"/>
  <text x="160" y="438" text-anchor="middle" font-family="system-ui" font-size="48" font-weight="700" fill="#fff">-</text>
  <circle cx="352" cy="420" r="52" fill="rgba(255,255,255,0.9)"/>
  <text x="352" y="438" text-anchor="middle" font-family="system-ui" font-size="48" font-weight="700" fill="#4f46e5">+</text>
</svg>
